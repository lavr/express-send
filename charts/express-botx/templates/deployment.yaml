apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "express-botx.fullname" . }}
  labels:
    {{- include "express-botx.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "express-botx.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "express-botx.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "express-botx.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      {{- if eq .Values.mode "worker" }}
      terminationGracePeriodSeconds: 35
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default (printf "%s-rootless" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if eq .Values.mode "serve-enqueue" }}
          args: ["serve", "--enqueue"]
          {{- else if eq .Values.mode "worker" }}
          args: ["worker"]
          {{- else }}
          args: ["serve"]
          {{- end }}
          ports:
            {{- if ne .Values.mode "worker" }}
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- end }}
            {{- if and (eq .Values.mode "worker") .Values.config.worker }}
            {{- if .Values.config.worker.health_listen }}
            - name: health
              containerPort: {{ trimPrefix ":" .Values.config.worker.health_listen }}
              protocol: TCP
            {{- end }}
            {{- end }}
          {{- if eq .Values.mode "worker" }}
          {{- if and .Values.config.worker .Values.config.worker.health_listen }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          {{- end }}
          {{- else }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: config
              mountPath: /etc/express-botx
              readOnly: true
            - name: cache
              mountPath: /tmp/express-botx
          env:
            - name: EXPRESS_BOTX_CONFIG
              value: /etc/express-botx/config.yaml
            {{- with .Values.extraEnv }}
            {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "express-botx.secretName" . }}
            items:
              - key: config.yaml
                path: config.yaml
        - name: cache
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
