# Application mode: "serve", "serve-enqueue", or "worker".
# - serve:          HTTP server → BotX API (synchronous, default)
# - serve-enqueue:  HTTP server → queue (asynchronous)
# - worker:         queue → BotX API
mode: serve

replicaCount: 1

image:
  repository: lavr/express-botx
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Config is mounted from a Secret into /etc/express-botx/config.yaml.
# It contains secrets (bot secret, API keys), so it uses Secret, not ConfigMap.
config:
  bots: {}
    # prod:
    #   host: express.example.com
    #   id: "bot-uuid-here"
    #   secret: "bot-secret-here"
  chats: {}
    # deploy: "chat-uuid-here"
    # alerts: "alerts-chat-uuid"
  cache:
    # type: file
  server:
    listen: ":8080"
    #base_path: /api/v1
    #allow_bot_secret_auth: false
    #api_keys: []
    #  - name: alertmanager
    #    key: "change-me"
    # alertmanager:
    #   default_chat_id: alerts
    # grafana:
    #   default_chat_id: monitoring

# Queue configuration (required for serve-enqueue and worker modes).
# Official lavr/express-botx images already include RabbitMQ and Kafka drivers.
# If you use a custom image, compile the required driver via BUILD_TAGS.
  # queue:
  #   driver: kafka          # rabbitmq | kafka
  #   url: broker:9092
  #   name: express-botx
  #   group: express-botx    # consumer group (worker only)
  #   reply_queue: ""        # optional reply queue/topic
  #   max_file_size: 1MB     # max file attachment size for async mode

  # producer:                # serve-enqueue mode
  #   routing_mode: mixed    # direct | catalog | mixed

  # worker:                  # worker mode
  #   retry_count: 3
  #   retry_backoff: 1s
  #   shutdown_timeout: 30s
  #   health_listen: ":8081"

  # catalog:                 # catalog for alias resolution
  #   queue_name: express-botx-catalog
  #   cache_file: /tmp/express-botx/catalog.json
  #   max_age: 10m
  #   publish: true          # worker publishes catalog snapshots
  #   publish_interval: 30s

# Use an existing Secret instead of generating one from config.*.
# The Secret must contain a "config.yaml" key with the full YAML config.
existingSecret: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
    # - host: express-botx.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv:
  - name: EXPRESS_BOTX_VERBOSE
    value: "1"
#  - name: VAULT_TOKEN
#    valueFrom:
#      secretKeyRef:
#        name: vault-token
#        key: token
