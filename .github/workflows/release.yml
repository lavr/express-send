name: Release

on:
  push:
    tags:
      - "[0-9]*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -tags "sentry newrelic kafka rabbitmq" -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "express-botx${EXT}" .

      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "$GOOS" = "windows" ]; then
            zip "express-botx-${GOOS}-${GOARCH}.zip" express-botx.exe
          else
            tar czf "express-botx-${GOOS}-${GOARCH}.tar.gz" express-botx
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: express-botx-${{ matrix.goos }}-${{ matrix.goarch }}
          path: express-botx-*.*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/express-botx-*

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256
        id: sha
        run: |
          echo "darwin_arm64=$(sha256sum dist/express-botx-darwin-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "darwin_amd64=$(sha256sum dist/express-botx-darwin-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum dist/express-botx-linux-arm64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_amd64=$(sha256sum dist/express-botx-linux-amd64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TAG="${GITHUB_REF_NAME}"

          cat > express-botx.rb << 'FORMULA'
          class ExpressBotx < Formula
            desc "CLI and HTTP server for sending messages to eXpress"
            homepage "https://github.com/lavr/express-botx"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/lavr/express-botx/releases/download/TAG_PLACEHOLDER/express-botx-darwin-arm64.tar.gz"
                sha256 "SHA_DARWIN_ARM64"
              else
                url "https://github.com/lavr/express-botx/releases/download/TAG_PLACEHOLDER/express-botx-darwin-amd64.tar.gz"
                sha256 "SHA_DARWIN_AMD64"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/lavr/express-botx/releases/download/TAG_PLACEHOLDER/express-botx-linux-arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64"
              else
                url "https://github.com/lavr/express-botx/releases/download/TAG_PLACEHOLDER/express-botx-linux-amd64.tar.gz"
                sha256 "SHA_LINUX_AMD64"
              end
            end

            def install
              bin.install "express-botx"
            end

            test do
              assert_match "express-botx", shell_output("#{bin}/express-botx --help 2>&1", 1)
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" express-botx.rb
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" express-botx.rb
          sed -i "s/SHA_DARWIN_ARM64/${{ steps.sha.outputs.darwin_arm64 }}/g" express-botx.rb
          sed -i "s/SHA_DARWIN_AMD64/${{ steps.sha.outputs.darwin_amd64 }}/g" express-botx.rb
          sed -i "s/SHA_LINUX_ARM64/${{ steps.sha.outputs.linux_arm64 }}/g" express-botx.rb
          sed -i "s/SHA_LINUX_AMD64/${{ steps.sha.outputs.linux_amd64 }}/g" express-botx.rb

          # Push to homebrew-tap
          gh api repos/lavr/homebrew-tap/contents/Formula/express-botx.rb \
            --method PUT \
            --field message="express-botx ${TAG}" \
            --field content="$(base64 -w0 express-botx.rb)" \
            --field branch="master" \
            --field sha="$(gh api repos/lavr/homebrew-tap/contents/Formula/express-botx.rb --jq '.sha' 2>/dev/null || echo '')" \
            2>/dev/null || \
          gh api repos/lavr/homebrew-tap/contents/Formula/express-botx.rb \
            --method PUT \
            --field message="express-botx ${TAG}" \
            --field content="$(base64 -w0 express-botx.rb)" \
            --field branch="master"

  docker:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (alpine)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: alpine
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            APM_TAG=newrelic
          tags: |
            lavr/express-botx:${{ github.ref_name }}
            lavr/express-botx:latest

      - name: Build and push (rootless)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: rootless
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
            APM_TAG=newrelic
          tags: |
            lavr/express-botx:${{ github.ref_name }}-rootless
            lavr/express-botx:latest-rootless

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: lavr/express-botx
          readme-filepath: ./docs/DOCKERHUB.md
