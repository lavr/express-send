# express-botx async mode with Kafka (KRaft, no Zookeeper)
#
# Usage:
#   cp .env.example .env   # fill in real values
#   docker compose up --build
#
# Architecture:
#   producer (serve --enqueue) → Kafka → worker → BotX API

services:
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9094,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "example-kafka-cluster-id-01"
    healthcheck:
      test: /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9094 --list
      interval: 5s
      timeout: 10s
      start_period: 30s
      retries: 15

  producer:
    build:
      context: ../..
      args:
        BUILD_TAGS: "kafka"
    command: ["serve", "--enqueue", "--config", "/config/config.yaml"]
    ports:
      - "8080:8080"
    volumes:
      - ./config-producer.yaml:/config/config.yaml:ro
      - catalog-cache:/cache
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

  worker:
    build:
      context: ../..
      args:
        BUILD_TAGS: "kafka"
    command: ["worker", "--config", "/config/config.yaml"]
    volumes:
      - ./config-worker.yaml:/config/config.yaml:ro
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  catalog-cache:
